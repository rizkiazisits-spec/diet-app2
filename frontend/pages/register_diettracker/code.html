<body class="flex items-center justify-center p-container-margin">
<div class="w-full max-w-md space-y-stack-lg">
<!-- Logo Header -->
<div class="text-center space-y-stack-sm">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container text-white mb-stack-sm shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined text-[32px]">restaurant</span>
</div>
<h1 class="font-display-xl-mobile text-display-xl-mobile text-on-surface tracking-tight font-extrabold">
                DietTracker
            </h1>
<p class="font-text-sm text-text-sm text-on-surface-variant">
                Mulai perjalanan hidup sehatmu hari ini.
            </p>
</div>
<!-- Registration Form Card -->
<div class="glass-card p-8 rounded-3xl shadow-xl transition-all duration-300">
<form class="space-y-stack-lg" id="registerForm" onsubmit="return false">
<!-- Email Field -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all duration-200 font-text-base text-text-base placeholder:text-outline" id="email" placeholder="nama@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant">lock</span>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all duration-200 font-text-base text-text-base placeholder:text-outline" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="confirm-password">Konfirmasi Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant">shield_lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all duration-200 font-text-base text-text-base placeholder:text-outline" id="confirm-password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start space-x-3 ml-1">
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary-container transition-all" id="terms" type="checkbox"/>
<label class="font-text-sm text-text-sm text-on-surface-variant" for="terms">
                        Saya menyetujui <a class="text-primary font-semibold hover:underline" href="#">Syarat &amp; Ketentuan</a> serta Kebijakan Privasi yang berlaku.
                    </label>
</div>
<!-- Register Button -->
<button class="w-full bg-primary-container text-white py-4 rounded-full font-headline-lg-mobile text-headline-lg-mobile font-bold shadow-lg shadow-primary-container/30 hover:opacity-90 active:scale-95 transition-all duration-200 uppercase tracking-wide" type="submit">
                    Daftar

<!-- Login Link -->
<div class="mt-8 text-center">
<p class="font-text-sm text-text-sm text-on-surface-variant">

</button>

<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary-container/10 rounded-full blur-3xl"></div>

<script>
        // Micro-interaction for password toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('password');
        
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            const icon = type === 'password' ? 'visibility' : 'visibility_off';
            toggleBtn.querySelector('span').innerText = icon;
        });

        // Simple form animation
        const form = document.getElementById('registerForm');
        form.addEventListener('submit', (e) => {
            const btn = form.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                alert('Pendaftaran berhasil! Mengalihkan...');
                btn.innerHTML = 'Daftar';
                btn.disabled = false;
            }, 1500);
        });
    </script>
