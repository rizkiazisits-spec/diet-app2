<body class="flex items-center justify-center p-container-margin overflow-x-hidden">
<!-- Brand Identity Anchor -->

<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mb-stack-md shadow-lg shadow-primary-container/20">

<h1 class="font-display-xl-mobile text-display-xl-mobile text-primary tracking-tight font-bold">DietTracker</h1>
<p class="font-text-sm text-text-sm text-on-surface-variant mt-2 text-center px-8">Precision diet management for your clinical health goals.</p>
</header>
<!-- Main Login Container -->
<main class="w-full max-w-[430px] bg-white rounded-[32px] p-8 login-card relative overflow-hidden transition-all duration-300 hover:shadow-xl">
<!-- Subtle Atmospheric Background Element -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary-container/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-10 -left-10 w-32 h-32 bg-primary-container/10 rounded-full blur-3xl"></div>
<form class="space-y-stack-lg relative z-10" id="loginForm">
<!-- Email Field -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl font-text-base text-text-base focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline-variant outline-none" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack-sm">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary-container hover:underline" href="#">Forgot?</a>
</div>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-low border-none rounded-xl font-text-base text-text-base focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline-variant outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passwordToggleIcon">visibility</span>
</button>
</div>
</div>
<!-- Login Action -->
<div class="pt-2">
<button class="w-full py-4 bg-primary-container text-white font-headline-lg-mobile text-headline-lg-mobile font-bold rounded-full shadow-lg shadow-primary-container/30 transform active:scale-[0.98] hover:opacity-90 transition-all duration-200" type="submit">
                    Login
                </button>
</div>
</form>
<!-- Social/Alternative Logic -->
<div class="mt-stack-lg relative z-10">
<div class="flex items-center gap-4 mb-stack-lg">
<div class="h-[1px] flex-1 bg-surface-container-high"></div>

<div class="h-[1px] flex-1 bg-surface-container-high"></div>

<div>
<h4 class="font-label-md text-label-md text-on-surface">Daily Tip</h4>
<p class="font-text-sm text-text-sm text-on-surface-variant italic">"Success is the sum of small efforts repeated day in and day out."</p>

<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('passwordToggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerText = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.disabled = true;
            
            // Simple mock loading state
            setTimeout(() => {
                btn.innerHTML = 'Success!';
                btn.classList.replace('bg-primary-container', 'bg-tertiary-container');
                setTimeout(() => {
                    alert('Login successful! Redirecting to dashboard...');
                    btn.innerHTML = 'Login';
                    btn.classList.replace('bg-tertiary-container', 'bg-primary-container');
                    btn.disabled = false;
                }, 1000);
            }, 1500);
        });

        // Add subtle parallax to the background on mouse move
        document.addEventListener('mousemove', (e) => {
            const amount = 5;
            const x = (e.clientX / window.innerWidth - 0.5) * amount;
            const y = (e.clientY / window.innerHeight - 0.5) * amount;
            document.body.style.backgroundPosition = `${x}px ${y}px`;
        });
    </script>
